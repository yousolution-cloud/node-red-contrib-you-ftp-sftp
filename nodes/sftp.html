<script type="text/x-red" data-template-name="sftp">
  <div class="form-row">
    <label for="node-config-input-host"><i class="fa fa-bookmark"></i> Host</label>
    <input type="text" id="node-config-input-host" placeholder="localhost" style="width: 40%;" />
    <label for="node-config-input-port" style="margin-left: 10px; width: 35px; "> Port</label>
    <input type="text" id="node-config-input-port" placeholder="22" style="width:45px">
  </div>
  <div class="form-row">
    <label for="node-config-input-username"><i class="fa fa-user"></i> User</label>
    <input type="text" id="node-config-input-username" placeholder="username" />
  </div>
  <div class="form-row">
    <label for="node-config-input-password"><i class="fa fa-lock"></i> Password</label>
    <input type="password" id="node-config-input-password">
  </div>
  <div class="form-row">
    <label><i class="fa fa-key"></i> SSH Key</label>
    <span class="ssh-key-input-data">
      <label class="red-ui-button" for="node-config-input-ssh-key-in">
        <i class="fa fa-upload"></i> Upload
      </label>
      <input class="hide" type="file" id="node-config-input-ssh-key-in">
      <span id="ssh-key-name" style="width: calc(100% - 230px); overflow: hidden; line-height:34px; height:34px; text-overflow: ellipsis; display: inline-block; vertical-align: middle;"> </span>
      <button type="button" class="red-ui-button red-ui-button-small" id="ssh-key-clear" style="margin-left: 6px;"><i class="fa fa-times"></i></button>
    </span>
    <input type="hidden" id="node-config-input-sshkey">
  </div>
  <div class="form-row" id="ssh-key-info-row" style="display:none;">
    <label><i class="fa fa-info-circle"></i> Key Info</label>
    <span id="ssh-key-info" style="line-height:34px; height:34px;"></span>
  </div>
  <div class="form-row ppk-passphrase-row" style="display:none;">
    <label for="node-config-input-ppkpassphrase"><i class="fa fa-lock"></i> PPK Passphrase</label>
    <input type="password" id="node-config-input-ppkpassphrase" placeholder="Passphrase for encrypted PPK key">
  </div>
  <div class="form-row">
    <label for="node-config-input-hmac"><i class="fa fa-wrench"></i>hmac</label>
    <select multiple type="text" id="node-config-input-hmac" size="9">
        <option value="hmac-sha2-256">hmac-sha2-256</option>
        <option value="hmac-sha2-512">hmac-sha2-512</option>
        <option value="hmac-sha1">hmac-sha1</option>
        <option value="hmac-md5">hmac-md5</option>
        <option value="hmac-sha2-256-96">hmac-sha2-256-96</option>
        <option value="hmac-sha2-512-96">hmac-sha2-512-96</option>
        <option value="hmac-ripemd160">hmac-ripemd160</option>
        <option value="hmac-sha1-96">hmac-sha1-96</option>
        <option value="hmac-md5-96">hmac-md5-96</option>
    </select>
  </div>
  <div class="form-row">
    <label for="node-config-input-cipher"><i class="fa fa-wrench"></i>cipher</label>
    <select multiple type="text" id="node-config-input-cipher" size="17">
        <option value="aes128-ctr">aes128-ctr</option>
        <option value="aes192-ctr">aes192-ctr</option>
        <option value="aes256-ctr">aes256-ctr</option>
        <option value="aes128-gcm">aes128-gcm (node v0.11.12 or newer)</option>
        <option value="aes128-gcm@openssh.com">aes128-gcm@openssh.com (node v0.11.12 or newer)</option>
        <option value="aes256-gcm">aes256-gcm (node v0.11.12 or newer)</option>
        <option value="aes256-gcm@openssh.com">aes256-gcm@openssh.com (node v0.11.12 or newer)</option>
        <option value="aes256-cbc">aes256-cbc</option>
        <option value="aes192-cbc">aes192-cbc</option>
        <option value="aes128-cbc">aes128-cbc</option>
        <option value="blowfish-cbc">blowfish-cbc</option>
        <option value="3des-cbc">3des-cbc</option>
        <option value="arcfour256">arcfour256</option>
        <option value="arcfour128">arcfour128</option>
        <option value="cast128-cbc">cast128-cbc</option>
        <option value="arcfour">arcfour</option>
    </select>
  </div>
</script>

<script type="text/javascript">
  RED.nodes.registerType('sftp', {
    category: 'config',
    color: 'BurlyWood',
    defaults: {
      host: { value: 'localhost' },
      port: { value: '22' },
      username: { value: '', required: true },
      password: { value: '' },
      sshkey: { value: '' },
      ppkpassphrase: { value: '' },
      hmac: { value: 'hmac-sha2-256,hmac-sha2-512,hmac-sha1', required: true },
      cipher: { value: 'aes128-ctr,aes192-ctr,aes256-ctr,aes128-gcm', required: true },
    },
    credentials: {
      sshkeydata: { type: 'text' },
    },
    label: function () {
      return this.host;
    },
    oneditprepare: function () {
      function updateKeyInfo(content) {
        var infoRow = $('#ssh-key-info-row');
        var infoEl = $('#ssh-key-info');
        var ppkRow = $('.ppk-passphrase-row');
        if (!content) {
          infoRow.hide();
          ppkRow.hide();
          return;
        }
        if (content.indexOf('PuTTY-User-Key-File-') !== -1) {
          var ver = content.indexOf('PuTTY-User-Key-File-3:') !== -1 ? 'v3' : 'v2';
          var algoMatch = content.match(/: (\S+)/);
          var algo = algoMatch ? algoMatch[1] : '?';
          var encrypted = !/Encryption:\s*none/i.test(content);
          var encLabel = encrypted ? 'encrypted' : 'unencrypted';
          infoEl.text('PPK ' + ver + ' / ' + algo + ' / ' + encLabel);
          infoRow.show();
          ppkRow.toggle(encrypted);
        } else {
          var isOpenSSH = content.indexOf('-----BEGIN OPENSSH PRIVATE KEY-----') !== -1;
          var isPEM = content.indexOf('-----BEGIN ') !== -1;
          infoEl.text(isOpenSSH ? 'OpenSSH format' : isPEM ? 'PEM format' : 'Key loaded');
          infoRow.show();
          ppkRow.hide();
        }
      }

      function saveFile(file) {
        var reader = new FileReader();
        reader.onload = function (event) {
          var data = event.target.result;
          $('#ssh-key-name').text(file.name);
          $('#node-config-input-sshkey').val(data);
          updateKeyInfo(data);
        };
        reader.readAsText(file, 'UTF-8');
      }

      function clearKey() {
        $('#ssh-key-name').text('');
        $('#node-config-input-sshkey').val('');
        $('#ssh-key-info-row').hide();
        $('.ppk-passphrase-row').hide();
      }

      // Detect if sshkey contains full key content (old format) or just a filename
      var savedKey = this.sshkey || '';
      if (savedKey.indexOf('-----BEGIN ') !== -1 || savedKey.indexOf('PuTTY-User-Key-File-') !== -1) {
        $('#node-config-input-sshkey').val(savedKey);
        $('#ssh-key-name').text('loaded');
        updateKeyInfo(savedKey);
      } else if (savedKey) {
        $('#ssh-key-name').text(savedKey);
        var existingData = $('#node-config-input-sshkey').val();
        if (existingData) updateKeyInfo(existingData);
      }

      $('#node-config-input-ssh-key-in').on('change', function () {
        if (this.files && this.files[0]) saveFile(this.files[0]);
      });

      $('#ssh-key-clear').on('click', clearKey);
    },
    oneditsave: function () {
      var keyData = $('#node-config-input-sshkey').val();
      if (keyData) {
        var name = $('#ssh-key-name').text();
        $('#node-config-input-sshkey').val(name);
        this.credentials.sshkeydata = keyData;
      } else {
        this.credentials.sshkeydata = '';
      }
    },
  });
</script>

<script type="text/x-red" data-help-name="sftp in">
  <h1>SFTP Client</h1>
  <p>
  <b>Node config:</b>
  process.env.<b>SFTP_SSH_KEY_FILE</b> - If you want to use private SSH key set this environment variable
  <ul>
  <li><b>PUT</b> - Set <code>msg.payload.filedata</code> to the file contents you want pushed and will be uploaded to {GUID}.FileExtension. If you need more changes file request to github.</li>
  <li><b>GET</b> - Set <code>msg.payload.filename</code> to get the file or will use Workdir + Filename in configuration. Leave configuration blank to set in code.</li>
  <li><b>DELETE</b> - Set <code>msg.payload.filename</code> to delete the file or will use Workdir + Filename in configuration. Leave configuration blank to set in code.</li>
  <li><b>LIST</b> - Uses the workdir</li>
  </ul>
  </p>
</script>

<script type="text/javascript">
  RED.nodes.registerType('sftp in', {
    category: 'storage-input',
    color: 'BurlyWood',
    defaults: {
      sftp: { type: 'sftp', required: true },
      operation: { value: 'list', required: true },
      filename: { value: '' },
      localFilename: { value: '' },
      fileContents: { value: '' },
      fileExtension: { value: '.txt' },
      workdir: { value: '' },
      savedir: { value: '' },
      name: { value: '' },
    },
    inputs: 1,
    outputs: 1,
    icon: 'file.png',
    label: function () {
      var sftpNode = RED.nodes.node(this.sftp);
      return this.name || 'sftp';
    },
    labelStyle: function () {
      return this.name ? 'node_label_italic' : '';
    },
    oneditprepare: function () {
      var filename = $('.input-filename-row');
      var fileContents = $('.input-fileContents-row');
      var fileExtension = $('.input-fileExtension-row');
      $('#node-input-operation').change(function () {
        var id = $('#node-input-operation option:selected').val();
        if (id == 'list') {
          filename.hide();
          fileExtension.hide();
        } else if (id == 'put') {
          filename.show();
          fileContents.hide();
          fileExtension.show();
        } else if (id == 'get') {
          filename.show();
          fileExtension.hide();
        } else if (id == 'delete') {
          filename.show();
          fileExtension.hide();
        } else {
          filename.show();
          fileExtension.hide();
        }
      });
    },
  });
</script>
